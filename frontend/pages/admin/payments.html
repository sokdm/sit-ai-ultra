<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Payments - SIT AI Ultra Admin</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', sans-serif;
            background: #0f0f1a;
            color: white;
            min-height: 100vh;
        }
        .navbar {
            background: rgba(26, 26, 46, 0.9);
            padding: 1rem 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid rgba(102, 126, 234, 0.2);
        }
        .logo {
            font-size: 1.5rem;
            font-weight: bold;
            background: linear-gradient(135deg, #667eea, #f093fb);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .nav-links {
            display: flex;
            gap: 2rem;
            align-items: center;
        }
        .nav-links a {
            color: #a0a0b0;
            text-decoration: none;
            transition: color 0.3s;
        }
        .nav-links a:hover, .nav-links a.active {
            color: #667eea;
        }
        .admin-info {
            display: flex;
            align-items: center;
            gap: 1rem;
        }
        .logout-btn {
            background: #ef4444;
            color: white;
            border: none;
            padding: 0.5rem 1rem;
            border-radius: 8px;
            cursor: pointer;
        }
        .container {
            padding: 2rem;
            max-width: 1400px;
            margin: 0 auto;
        }
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 2rem;
        }
        .filters {
            display: flex;
            gap: 1rem;
        }
        select {
            padding: 0.8rem 1rem;
            border: 1px solid rgba(102, 126, 234, 0.3);
            border-radius: 8px;
            background: rgba(255, 255, 255, 0.05);
            color: white;
            font-size: 1rem;
        }
        .section {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(102, 126, 234, 0.2);
            border-radius: 15px;
            padding: 1.5rem;
        }
        table {
            width: 100%;
            border-collapse: collapse;
        }
        th, td {
            text-align: left;
            padding: 1rem;
            border-bottom: 1px solid rgba(102, 126, 234, 0.1);
        }
        th {
            color: #a0a0b0;
            font-weight: 500;
        }
        .status {
            padding: 0.3rem 0.8rem;
            border-radius: 20px;
            font-size: 0.8rem;
        }
        .status.successful {
            background: rgba(74, 222, 128, 0.2);
            color: #4ade80;
        }
        .status.pending {
            background: rgba(102, 126, 234, 0.2);
            color: #667eea;
        }
        .status.failed {
            background: rgba(239, 68, 68, 0.2);
            color: #ef4444;
        }
        .pagination {
            display: flex;
            justify-content: center;
            gap: 1rem;
            margin-top: 2rem;
        }
        .btn {
            padding: 0.8rem 1.5rem;
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
        }
    </style>
</head>
<body>
    <nav class="navbar">
        <div class="logo">🎓 SIT AI Ultra Admin</div>
        <div class="nav-links">
            <a href="dashboard.html">Dashboard</a>
            <a href="users.html">Users</a>
            <a href="payments.html" class="active">Payments</a>
            <div class="admin-info">
                <span id="adminName">Admin</span>
                <button class="logout-btn" onclick="logout()">Logout</button>
            </div>
        </div>
    </nav>

    <div class="container">
        <div class="header">
            <h1>Payment History</h1>
            <div class="filters">
                <select id="statusFilter" onchange="loadPayments()">
                    <option value="">All Status</option>
                    <option value="successful">Successful</option>
                    <option value="pending">Pending</option>
                    <option value="failed">Failed</option>
                </select>
            </div>
        </div>

        <div class="section">
            <table>
                <thead>
                    <tr>
                        <th>Transaction ID</th>
                        <th>User</th>
                        <th>Amount</th>
                        <th>Plan</th>
                        <th>Status</th>
                        <th>Date</th>
                    </tr>
                </thead>
                <tbody id="paymentsTable"></tbody>
            </table>
        </div>

        <div class="pagination" id="pagination"></div>
    </div>

    <script>
        const API_BASE_URL = '/api';
        const token = localStorage.getItem('adminToken');
        
        if (!token) {
            window.location.href = 'login.html';
        }
        
        const adminName = localStorage.getItem('adminName');
        if (adminName) {
            document.getElementById('adminName').textContent = adminName;
        }
        
        async function loadPayments(page = 1) {
            const status = document.getElementById('statusFilter').value;
            
            let url = `${API_BASE_URL}/admin/payments?page=${page}&limit=20`;
            if (status) url += `&status=${status}`;
            
            try {
                const response = await fetch(url, {
                    headers: { 'Authorization': `Bearer ${token}` }
                });
                
                if (response.status === 401) {
                    logout();
                    return;
                }
                
                const data = await response.json();
                
                if (data.success) {
                    renderPayments(data.payments);
                    // Simple pagination - adjust based on your backend response
                }
            } catch (error) {
                console.error('Error loading payments:', error);
            }
        }
        
        function renderPayments(payments) {
            const tbody = document.getElementById('paymentsTable');
            tbody.innerHTML = payments.map(payment => `
                <tr>
                    <td>${payment.txRef}</td>
                    <td>${payment.customerName || payment.user?.email || 'Unknown'}</td>
                    <td>$${payment.amount} ${payment.currency}</td>
                    <td>${payment.plan}</td>
                    <td><span class="status ${payment.status}">${payment.status}</span></td>
                    <td>${new Date(payment.createdAt).toLocaleString()}</td>
                </tr>
            `).join('');
        }
        
        function logout() {
            localStorage.removeItem('adminToken');
            localStorage.removeItem('adminName');
            window.location.href = 'login.html';
        }
        
        loadPayments();
    </script>
</body>
</html>
