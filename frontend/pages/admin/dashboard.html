<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard - SIT AI Ultra</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', sans-serif;
            background: #0f0f1a;
            color: white;
            min-height: 100vh;
        }
        .navbar {
            background: rgba(26, 26, 46, 0.9);
            padding: 1rem 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid rgba(102, 126, 234, 0.2);
        }
        .logo {
            font-size: 1.5rem;
            font-weight: bold;
            background: linear-gradient(135deg, #667eea, #f093fb);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .nav-links {
            display: flex;
            gap: 2rem;
            align-items: center;
        }
        .nav-links a {
            color: #a0a0b0;
            text-decoration: none;
            transition: color 0.3s;
        }
        .nav-links a:hover, .nav-links a.active {
            color: #667eea;
        }
        .admin-info {
            display: flex;
            align-items: center;
            gap: 1rem;
        }
        .logout-btn {
            background: #ef4444;
            color: white;
            border: none;
            padding: 0.5rem 1rem;
            border-radius: 8px;
            cursor: pointer;
        }
        .container {
            padding: 2rem;
            max-width: 1400px;
            margin: 0 auto;
        }
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 1.5rem;
            margin-bottom: 2rem;
        }
        .stat-card {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(102, 126, 234, 0.2);
            border-radius: 15px;
            padding: 1.5rem;
        }
        .stat-card h3 {
            color: #a0a0b0;
            font-size: 0.9rem;
            margin-bottom: 0.5rem;
            text-transform: uppercase;
        }
        .stat-value {
            font-size: 2rem;
            font-weight: bold;
            background: linear-gradient(135deg, #667eea, #f093fb);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .stat-change {
            color: #4ade80;
            font-size: 0.9rem;
            margin-top: 0.5rem;
        }
        .section {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(102, 126, 234, 0.2);
            border-radius: 15px;
            padding: 1.5rem;
            margin-bottom: 2rem;
        }
        .section-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1.5rem;
        }
        .section h2 {
            font-size: 1.3rem;
        }
        .view-all {
            color: #667eea;
            text-decoration: none;
            font-size: 0.9rem;
        }
        table {
            width: 100%;
            border-collapse: collapse;
        }
        th, td {
            text-align: left;
            padding: 1rem;
            border-bottom: 1px solid rgba(102, 126, 234, 0.1);
        }
        th {
            color: #a0a0b0;
            font-weight: 500;
            font-size: 0.9rem;
        }
        .status {
            padding: 0.3rem 0.8rem;
            border-radius: 20px;
            font-size: 0.8rem;
            font-weight: 500;
        }
        .status.active {
            background: rgba(74, 222, 128, 0.2);
            color: #4ade80;
        }
        .status.trial {
            background: rgba(102, 126, 234, 0.2);
            color: #667eea;
        }
        .status.none {
            background: rgba(160, 160, 176, 0.2);
            color: #a0a0b0;
        }
        .status.successful {
            background: rgba(74, 222, 128, 0.2);
            color: #4ade80;
        }
        .loading {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 200px;
        }
        .spinner {
            width: 40px;
            height: 40px;
            border: 4px solid rgba(102, 126, 234, 0.3);
            border-radius: 50%;
            border-top-color: #667eea;
            animation: spin 1s linear infinite;
        }
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        .quick-actions {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 1rem;
            margin-bottom: 2rem;
        }
        .action-btn {
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            border: none;
            padding: 1rem;
            border-radius: 10px;
            cursor: pointer;
            font-size: 1rem;
            transition: transform 0.3s;
        }
        .action-btn:hover {
            transform: translateY(-2px);
        }
        .error-message {
            background: rgba(239, 68, 68, 0.2);
            color: #ef4444;
            padding: 1rem;
            border-radius: 10px;
            margin-bottom: 1rem;
            text-align: center;
        }
    </style>
</head>
<body>
    <nav class="navbar">
        <div class="logo">🎓 SIT AI Ultra Admin</div>
        <div class="nav-links">
            <a href="dashboard.html" class="active">Dashboard</a>
            <a href="users.html">Users</a>
            <a href="payments.html">Payments</a>
            <div class="admin-info">
                <span id="adminName">Admin</span>
                <button class="logout-btn" onclick="logout()">Logout</button>
            </div>
        </div>
    </nav>

    <div class="container">
        <div class="quick-actions">
            <button class="action-btn" onclick="window.location.href='users.html'">👥 Manage Users</button>
            <button class="action-btn" onclick="window.location.href='payments.html'">💳 View Payments</button>
            <button class="action-btn" onclick="alert('Feature coming soon')">📧 Send Newsletter</button>
            <button class="action-btn" onclick="alert('Feature coming soon')">⚙️ System Settings</button>
        </div>

        <div id="errorState" style="display: none;" class="error-message"></div>

        <div id="loadingState" class="loading">
            <div class="spinner"></div>
        </div>

        <div id="content" style="display: none;">
            <div class="stats-grid" id="statsGrid">
                <!-- Stats will be loaded here -->
            </div>

            <div class="section">
                <div class="section-header">
                    <h2>Recent Users</h2>
                    <a href="users.html" class="view-all">View All →</a>
                </div>
                <table id="recentUsersTable">
                    <thead>
                        <tr>
                            <th>Name</th>
                            <th>Email</th>
                            <th>Status</th>
                            <th>Joined</th>
                        </tr>
                    </thead>
                    <tbody></tbody>
                </table>
            </div>

            <div class="section">
                <div class="section-header">
                    <h2>Recent Payments</h2>
                    <a href="payments.html" class="view-all">View All →</a>
                </div>
                <table id="recentPaymentsTable">
                    <thead>
                        <tr>
                            <th>User</th>
                            <th>Amount</th>
                            <th>Plan</th>
                            <th>Status</th>
                            <th>Date</th>
                        </tr>
                    </thead>
                    <tbody></tbody>
                </table>
            </div>
        </div>
    </div>

    <script>
        const API_BASE_URL = '/api';
        
        // Check admin auth - adminToken is separate from user token
        const token = localStorage.getItem('adminToken');
        console.log('Admin token:', token ? 'exists' : 'missing');
        
        if (!token) {
            console.log('No admin token, redirecting to login');
            window.location.href = 'login.html';
        } else {
            console.log('Token found, loading dashboard...');
        }
        
        const adminName = localStorage.getItem('adminName');
        if (adminName) {
            document.getElementById('adminName').textContent = adminName;
        }
        
        async function loadDashboard() {
            console.log('Fetching dashboard data...');
            try {
                const response = await fetch(`${API_BASE_URL}/admin/dashboard`, {
                    headers: {
                        'Authorization': `Bearer ${token}`
                    }
                });
                
                console.log('Response status:', response.status);
                
                if (response.status === 401) {
                    console.log('Unauthorized - clearing token and redirecting');
                    localStorage.removeItem('adminToken');
                    localStorage.removeItem('adminName');
                    window.location.href = 'login.html';
                    return;
                }
                
                const data = await response.json();
                console.log('Response data:', data);
                
                if (data.success) {
                    renderStats(data.stats);
                    renderRecentUsers(data.recentUsers);
                    renderRecentPayments(data.recentPayments);
                    
                    document.getElementById('loadingState').style.display = 'none';
                    document.getElementById('content').style.display = 'block';
                } else {
                    showError(data.error || 'Failed to load dashboard');
                }
            } catch (error) {
                console.error('Error loading dashboard:', error);
                showError('Network error: ' + error.message);
            }
        }
        
        function showError(message) {
            document.getElementById('loadingState').style.display = 'none';
            const errorDiv = document.getElementById('errorState');
            errorDiv.textContent = message;
            errorDiv.style.display = 'block';
        }
        
        function renderStats(stats) {
            const statsHtml = `
                <div class="stat-card">
                    <h3>Total Users</h3>
                    <div class="stat-value">${stats.totalUsers || 0}</div>
                    <div class="stat-change">+${stats.newUsersToday || 0} today</div>
                </div>
                <div class="stat-card">
                    <h3>Active Subscriptions</h3>
                    <div class="stat-value">${stats.activeSubscriptions || 0}</div>
                    <div class="stat-change">${stats.trialUsers || 0} on trial</div>
                </div>
                <div class="stat-card">
                    <h3>Total Revenue</h3>
                    <div class="stat-value">$${(stats.totalRevenue || 0).toFixed(2)}</div>
                    <div class="stat-change">+$${(stats.todayRevenue || 0).toFixed(2)} today</div>
                </div>
                <div class="stat-card">
                    <h3>Pending Payments</h3>
                    <div class="stat-value">${stats.pendingPayments || 0}</div>
                    <div class="stat-change">${stats.failedPayments || 0} failed</div>
                </div>
            `;
            document.getElementById('statsGrid').innerHTML = statsHtml;
        }
        
        function renderRecentUsers(users) {
            const tbody = document.querySelector('#recentUsersTable tbody');
            if (!users || users.length === 0) {
                tbody.innerHTML = '<tr><td colspan="4" style="text-align: center; color: #a0a0b0;">No users found</td></tr>';
                return;
            }
            tbody.innerHTML = users.map(user => `
                <tr>
                    <td>${user.firstName || ''} ${user.lastName || ''}</td>
                    <td>${user.email || ''}</td>
                    <td><span class="status ${user.subscriptionStatus || 'none'}">${user.subscriptionStatus || 'none'}</span></td>
                    <td>${user.createdAt ? new Date(user.createdAt).toLocaleDateString() : '-'}</td>
                </tr>
            `).join('');
        }
        
        function renderRecentPayments(payments) {
            const tbody = document.querySelector('#recentPaymentsTable tbody');
            if (!payments || payments.length === 0) {
                tbody.innerHTML = '<tr><td colspan="5" style="text-align: center; color: #a0a0b0;">No payments found</td></tr>';
                return;
            }
            tbody.innerHTML = payments.map(payment => `
                <tr>
                    <td>${payment.user?.firstName || ''} ${payment.user?.lastName || payment.user?.email || 'Unknown'}</td>
                    <td>$${payment.amount || 0}</td>
                    <td>${payment.plan || '-'}</td>
                    <td><span class="status ${payment.status || 'pending'}">${payment.status || 'pending'}</span></td>
                    <td>${payment.createdAt ? new Date(payment.createdAt).toLocaleDateString() : '-'}</td>
                </tr>
            `).join('');
        }
        
        function logout() {
            localStorage.removeItem('adminToken');
            localStorage.removeItem('adminName');
            window.location.href = 'login.html';
        }
        
        // Load dashboard when page loads
        if (token) {
            loadDashboard();
        }
    </script>
</body>
</html>
