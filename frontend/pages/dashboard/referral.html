<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Refer & Earn - SIT AI Ultra</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', sans-serif;
            background: #0f0f1a;
            color: white;
            min-height: 100vh;
        }
        .navbar {
            background: rgba(26, 26, 46, 0.9);
            padding: 1rem 1.5rem;
            display: flex;
            align-items: center;
            gap: 1rem;
            border-bottom: 1px solid rgba(102, 126, 234, 0.2);
        }
        .back-btn {
            color: #667eea;
            text-decoration: none;
            font-size: 1.2rem;
        }
        .logo {
            font-size: 1.3rem;
            font-weight: bold;
            background: linear-gradient(135deg, #667eea, #f093fb);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .container {
            padding: 1.5rem;
            max-width: 600px;
            margin: 0 auto;
        }
        .header-section {
            text-align: center;
            margin-bottom: 2rem;
        }
        .header-section h1 {
            font-size: 2rem;
            margin-bottom: 0.5rem;
        }
        .header-section p {
            color: #a0a0b0;
        }
        .referral-box {
            background: linear-gradient(135deg, rgba(102, 126, 234, 0.2), rgba(118, 75, 162, 0.2));
            border: 2px dashed #667eea;
            border-radius: 20px;
            padding: 2rem;
            text-align: center;
            margin-bottom: 2rem;
        }
        .referral-box h3 {
            margin-bottom: 1rem;
            color: #a0a0b0;
        }
        .code-display {
            background: rgba(0, 0, 0, 0.3);
            padding: 1.5rem;
            border-radius: 15px;
            font-size: 2rem;
            font-weight: bold;
            letter-spacing: 0.3rem;
            margin-bottom: 1rem;
            font-family: monospace;
        }
        .copy-btn {
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            border: none;
            padding: 1rem 2rem;
            border-radius: 25px;
            font-size: 1rem;
            cursor: pointer;
            transition: transform 0.3s;
        }
        .copy-btn:hover {
            transform: translateY(-2px);
        }
        .copy-btn.copied {
            background: #4ade80;
        }
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 1rem;
            margin-bottom: 2rem;
        }
        .stat-card {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(102, 126, 234, 0.2);
            border-radius: 15px;
            padding: 1.5rem;
            text-align: center;
        }
        .stat-value {
            font-size: 2.5rem;
            font-weight: bold;
            color: #667eea;
            margin-bottom: 0.5rem;
        }
        .stat-label {
            color: #a0a0b0;
            font-size: 0.9rem;
        }
        .reward-banner {
            background: linear-gradient(135deg, rgba(74, 222, 128, 0.2), rgba(34, 197, 94, 0.2));
            border: 1px solid rgba(74, 222, 128, 0.3);
            border-radius: 15px;
            padding: 1.5rem;
            text-align: center;
        }
        .reward-banner h3 {
            color: #4ade80;
            margin-bottom: 0.5rem;
        }
        .loading {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 200px;
        }
        .spinner {
            width: 50px;
            height: 50px;
            border: 4px solid rgba(102, 126, 234, 0.3);
            border-radius: 50%;
            border-top-color: #667eea;
            animation: spin 1s linear infinite;
        }
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        .error-message {
            background: rgba(239, 68, 68, 0.2);
            color: #ef4444;
            padding: 1rem;
            border-radius: 10px;
            text-align: center;
            margin-bottom: 1rem;
        }
        .share-buttons {
            display: flex;
            gap: 1rem;
            justify-content: center;
            margin-top: 1rem;
        }
        .share-btn {
            width: 45px;
            height: 45px;
            border-radius: 50%;
            border: none;
            cursor: pointer;
            font-size: 1.2rem;
            transition: transform 0.3s;
        }
        .share-btn:hover {
            transform: scale(1.1);
        }
        .share-btn.whatsapp { background: #25d366; color: white; }
        .share-btn.telegram { background: #0088cc; color: white; }
        .share-btn.twitter { background: #1da1f2; color: white; }
        .share-btn.facebook { background: #4267B2; color: white; }
    </style>
</head>
<body>
    <nav class="navbar">
        <a href="index.html" class="back-btn">← Back to Dashboard</a>
        <div class="logo">🎓 SIT AI Ultra</div>
    </nav>

    <div class="container">
        <div class="header-section">
            <h1>Refer & Earn 🎁</h1>
            <p>Invite friends and get free subscription days!</p>
        </div>

        <div id="loadingState" class="loading">
            <div class="spinner"></div>
        </div>

        <div id="errorState" style="display: none;" class="error-message"></div>

        <div id="content" style="display: none;">
            <div class="referral-box">
                <h3>Your Referral Code</h3>
                <div class="code-display" id="referralCode">------</div>
                <button class="copy-btn" id="copyBtn" onclick="copyCode()">Copy Code</button>
                
                <div class="share-buttons">
                    <button class="share-btn whatsapp" onclick="share('whatsapp')" title="Share on WhatsApp">📱</button>
                    <button class="share-btn telegram" onclick="share('telegram')" title="Share on Telegram">✈️</button>
                    <button class="share-btn twitter" onclick="share('twitter')" title="Share on Twitter">🐦</button>
                    <button class="share-btn facebook" onclick="share('facebook')" title="Share on Facebook">📘</button>
                </div>
            </div>

            <div class="stats-grid">
                <div class="stat-card">
                    <div class="stat-value" id="invitedCount">0</div>
                    <div class="stat-label">Invited</div>
                </div>
                <div class="stat-card">
                    <div class="stat-value" id="joinedCount">0</div>
                    <div class="stat-label">Joined</div>
                </div>
                <div class="stat-card">
                    <div class="stat-value" id="rewardsCount">0</div>
                    <div class="stat-label">Rewards</div>
                </div>
            </div>

            <div class="reward-banner">
                <h3>🎉 Invite 10 friends and get 7 days free!</h3>
                <p>For every friend who joins using your code, you get 1 day free!</p>
            </div>
        </div>
    </div>

    <script>
        const API_BASE_URL = '/api';
        const token = localStorage.getItem('token');
        let referralCode = '';

        if (!token) {
            window.location.href = '../auth/login.html';
        }

        async function loadReferralData() {
            try {
                const response = await fetch(`${API_BASE_URL}/referral/stats`, {
                    headers: {
                        'Authorization': `Bearer ${token}`
                    }
                });

                if (!response.ok) {
                    throw new Error('Failed to load referral data');
                }

                const data = await response.json();

                if (data.success) {
                    referralCode = data.referralCode || generateCode();
                    document.getElementById('referralCode').textContent = referralCode;
                    document.getElementById('invitedCount').textContent = data.invited || 0;
                    document.getElementById('joinedCount').textContent = data.joined || 0;
                    document.getElementById('rewardsCount').textContent = data.rewards || 0;
                    
                    document.getElementById('loadingState').style.display = 'none';
                    document.getElementById('content').style.display = 'block';
                } else {
                    throw new Error(data.error || 'Failed to load data');
                }
            } catch (error) {
                console.error('Error loading referral data:', error);
                document.getElementById('loadingState').style.display = 'none';
                
                // Generate fallback code from user data
                const user = JSON.parse(localStorage.getItem('user') || '{}');
                referralCode = user.referralCode || generateCode();
                document.getElementById('referralCode').textContent = referralCode;
                document.getElementById('content').style.display = 'block';
            }
        }

        function generateCode() {
            const user = JSON.parse(localStorage.getItem('user') || '{}');
            if (user.email) {
                return user.email.substring(0, 6).toUpperCase() + Math.random().toString(36).substring(2, 4).toUpperCase();
            }
            return 'SIT' + Math.random().toString(36).substring(2, 6).toUpperCase();
        }

        function copyCode() {
            navigator.clipboard.writeText(referralCode).then(() => {
                const btn = document.getElementById('copyBtn');
                btn.textContent = 'Copied!';
                btn.classList.add('copied');
                setTimeout(() => {
                    btn.textContent = 'Copy Code';
                    btn.classList.remove('copied');
                }, 2000);
            });
        }

        function share(platform) {
            const text = `Join me on SIT AI Ultra - the best AI tutor! Use my code: ${referralCode}`;
            const url = window.location.origin;
            
            const shareUrls = {
                whatsapp: `https://wa.me/?text=${encodeURIComponent(text + ' ' + url)}`,
                telegram: `https://t.me/share/url?url=${encodeURIComponent(url)}&text=${encodeURIComponent(text)}`,
                twitter: `https://twitter.com/intent/tweet?text=${encodeURIComponent(text)}&url=${encodeURIComponent(url)}`,
                facebook: `https://www.facebook.com/sharer/sharer.php?u=${encodeURIComponent(url)}`
            };
            
            if (shareUrls[platform]) {
                window.open(shareUrls[platform], '_blank');
            }
        }

        loadReferralData();
    </script>
</body>
</html>
