<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Tutor - SIT AI Ultra</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', sans-serif;
            background: #0f0f1a;
            color: white;
            height: 100vh;
            display: flex;
            flex-direction: column;
        }
        .header {
            background: rgba(26, 26, 46, 0.9);
            padding: 1rem 1.5rem;
            display: flex;
            align-items: center;
            gap: 1rem;
            border-bottom: 1px solid rgba(102, 126, 234, 0.2);
        }
        .back-btn {
            color: #667eea;
            text-decoration: none;
            font-size: 1.2rem;
        }
        .ai-info {
            display: flex;
            align-items: center;
            gap: 0.8rem;
            flex: 1;
        }
        .ai-avatar {
            width: 40px;
            height: 40px;
            background: linear-gradient(135deg, #667eea, #764ba2);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.5rem;
        }
        .ai-status h3 {
            font-size: 1rem;
            margin-bottom: 0.2rem;
        }
        .ai-status span {
            color: #4ade80;
            font-size: 0.8rem;
            display: flex;
            align-items: center;
            gap: 0.3rem;
        }
        .ai-status span::before {
            content: '';
            width: 8px;
            height: 8px;
            background: #4ade80;
            border-radius: 50%;
            display: inline-block;
        }
        .new-chat-btn {
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            border: none;
            padding: 0.6rem 1rem;
            border-radius: 8px;
            cursor: pointer;
            font-size: 0.9rem;
        }
        .chat-container {
            flex: 1;
            display: flex;
            overflow: hidden;
        }
        .main-chat {
            flex: 1;
            display: flex;
            flex-direction: column;
            background: #0f0f1a;
        }
        .messages {
            flex: 1;
            overflow-y: auto;
            padding: 1.5rem;
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }
        .message {
            max-width: 80%;
            padding: 1rem;
            border-radius: 15px;
            line-height: 1.5;
        }
        .message.user {
            align-self: flex-end;
            background: linear-gradient(135deg, #667eea, #764ba2);
            border-bottom-right-radius: 5px;
        }
        .message.ai {
            align-self: flex-start;
            background: rgba(255, 255, 255, 0.1);
            border-bottom-left-radius: 5px;
        }
        .message-time {
            font-size: 0.75rem;
            color: rgba(255,255,255,0.6);
            margin-top: 0.5rem;
        }
        .typing-indicator {
            display: none;
            align-self: flex-start;
            background: rgba(255, 255, 255, 0.1);
            padding: 1rem 1.5rem;
            border-radius: 15px;
            border-bottom-left-radius: 5px;
        }
        .typing-indicator.active {
            display: flex;
            gap: 0.3rem;
        }
        .typing-indicator span {
            width: 8px;
            height: 8px;
            background: #667eea;
            border-radius: 50%;
            animation: bounce 1.4s infinite ease-in-out both;
        }
        .typing-indicator span:nth-child(1) { animation-delay: -0.32s; }
        .typing-indicator span:nth-child(2) { animation-delay: -0.16s; }
        @keyframes bounce {
            0%, 80%, 100% { transform: scale(0); }
            40% { transform: scale(1); }
        }
        .input-area {
            padding: 1rem 1.5rem;
            border-top: 1px solid rgba(102, 126, 234, 0.2);
            display: flex;
            gap: 0.8rem;
            align-items: center;
        }
        .input-wrapper {
            flex: 1;
            display: flex;
            align-items: center;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(102, 126, 234, 0.3);
            border-radius: 25px;
            padding: 0.5rem 1rem;
        }
        .input-wrapper input {
            flex: 1;
            background: none;
            border: none;
            color: white;
            font-size: 1rem;
            outline: none;
            padding: 0.5rem;
        }
        .input-wrapper input::placeholder {
            color: #a0a0b0;
        }
        .attach-btn, .mic-btn, .send-btn {
            background: none;
            border: none;
            color: #667eea;
            font-size: 1.3rem;
            cursor: pointer;
            padding: 0.5rem;
        }
        .send-btn {
            width: 45px;
            height: 45px;
            background: linear-gradient(135deg, #667eea, #764ba2);
            border-radius: 50%;
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .welcome-message {
            text-align: center;
            padding: 2rem;
            color: #a0a0b0;
        }
        .welcome-message h2 {
            color: white;
            margin-bottom: 1rem;
            font-size: 1.5rem;
        }
        .welcome-features {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 1rem;
            margin-top: 2rem;
            max-width: 500px;
            margin-left: auto;
            margin-right: auto;
        }
        .feature-chip {
            background: rgba(102, 126, 234, 0.2);
            padding: 0.8rem;
            border-radius: 10px;
            font-size: 0.9rem;
            cursor: pointer;
            transition: background 0.3s;
        }
        .feature-chip:hover {
            background: rgba(102, 126, 234, 0.4);
        }
    </style>
</head>
<body>
    <div class="header">
        <a href="/pages/dashboard/index.html" class="back-btn">←</a>
        <div class="ai-info">
            <div class="ai-avatar">🤖</div>
            <div class="ai-status">
                <h3>AI Tutor</h3>
                <span>Online</span>
            </div>
        </div>
        <button class="new-chat-btn" onclick="startNewChat()">+ New Chat</button>
    </div>

    <div class="chat-container">
        <main class="main-chat">
            <div class="messages" id="messages">
                <div class="welcome-message" id="welcomeMessage">
                    <h2>👋 Hi, I'm your AI Tutor!</h2>
                    <p>I can help you with:</p>
                    <div class="welcome-features">
                        <div class="feature-chip" onclick="sendQuickMessage('Help me with Math')">📐 Mathematics</div>
                        <div class="feature-chip" onclick="sendQuickMessage('Explain Science concepts')">🔬 Science</div>
                        <div class="feature-chip" onclick="sendQuickMessage('Teach me Python')">🐍 Python Coding</div>
                        <div class="feature-chip" onclick="sendQuickMessage('Help with homework')">📝 Homework Help</div>
                    </div>
                </div>
            </div>
            
            <div class="typing-indicator" id="typingIndicator">
                <span></span>
                <span></span>
                <span></span>
            </div>
            
            <div class="input-area">
                <div class="input-wrapper">
                    <button class="attach-btn">📎</button>
                    <input type="text" id="messageInput" placeholder="Ask me anything..." onkeypress="handleKeyPress(event)">
                    <button class="mic-btn">🎤</button>
                </div>
                <button class="send-btn" onclick="sendMessage()">➤</button>
            </div>
        </main>
    </div>

    <script>
        const API_BASE_URL = '/api';
        const token = localStorage.getItem('token');
        let currentChatId = null;
        let isTyping = false;

        if (!token) {
            window.location.href = '../auth/login.html';
        }

        function handleKeyPress(e) {
            if (e.key === 'Enter') sendMessage();
        }

        function sendQuickMessage(text) {
            document.getElementById('messageInput').value = text;
            sendMessage();
        }

        async function sendMessage() {
            const input = document.getElementById('messageInput');
            const message = input.value.trim();
            if (!message || isTyping) return;

            document.getElementById('welcomeMessage').style.display = 'none';
            addMessage(message, 'user');
            input.value = '';
            showTyping(true);

            try {
                const response = await fetch(`${API_BASE_URL}/ai/chat`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${token}`
                    },
                    body: JSON.stringify({ message, chatId: currentChatId })
                });

                const data = await response.json();
                showTyping(false);

                if (data.success) {
                    addMessage(data.response, 'ai');
                    if (data.chatId) currentChatId = data.chatId;
                } else {
                    addMessage('Sorry, I encountered an error. Please try again.', 'ai');
                }
            } catch (error) {
                showTyping(false);
                addMessage('Network error. Please check your connection.', 'ai');
            }
        }

        function addMessage(text, sender) {
            const messages = document.getElementById('messages');
            const messageDiv = document.createElement('div');
            messageDiv.className = `message ${sender}`;
            const time = new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
            messageDiv.innerHTML = `<div>${escapeHtml(text)}</div><div class="message-time">${time}</div>`;
            messages.appendChild(messageDiv);
            messages.scrollTop = messages.scrollHeight;
        }

        function showTyping(show) {
            isTyping = show;
            document.getElementById('typingIndicator').classList.toggle('active', show);
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        function startNewChat() {
            currentChatId = null;
            document.getElementById('messages').innerHTML = `
                <div class="welcome-message" id="welcomeMessage">
                    <h2>👋 Hi, I'm your AI Tutor!</h2>
                    <p>I can help you with:</p>
                    <div class="welcome-features">
                        <div class="feature-chip" onclick="sendQuickMessage('Help me with Math')">📐 Mathematics</div>
                        <div class="feature-chip" onclick="sendQuickMessage('Explain Science concepts')">🔬 Science</div>
                        <div class="feature-chip" onclick="sendQuickMessage('Teach me Python')">🐍 Python Coding</div>
                        <div class="feature-chip" onclick="sendQuickMessage('Help with homework')">📝 Homework Help</div>
                    </div>
                </div>
            `;
        }
    </script>
</body>
</html>
